##Definimos el tipo de base de datos que vamos a conectar 
quarkus.datasource.db-kind=postgresql

##Usuario y password que se conecta al tipo de base de datos a usar

quarkus.datasource.username=postgres
quarkus.datasource.password=labcom,2015

##URL a la conexion de la base de datos

quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/pruebafinal

##parametros recomendables

##Sincronizar lo que contenga en codigo a la base de datos
quarkus.hibernate-orm.database.generation=update

##quarkus.hibernate-orm.database.generation=drop-and-create

quarkus.hibernate-orm.sql-load-script=import.sql
##Al momento de ejecutar se muestra la consola de lo que se creo en la base sql
quarkus.hibernate-orm.log.sql=true
